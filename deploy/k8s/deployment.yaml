apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-roundup
  namespace: image-roundup
  labels:
    app.kubernetes.io/name: image-roundup
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: image-roundup
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-roundup
    spec:
      serviceAccountName: image-roundup
      # No runAsUser — OpenShift assigns a UID from the namespace's allowed range.
      # This satisfies restricted-v2 SCC without needing anyuid or privileged.
      securityContext:
        runAsNonRoot: true
      volumes:
        - name: data
          persistentVolumeClaim:
            # To use an existing claim instead of the one in pvc.yaml,
            # change claimName here and skip applying pvc.yaml.
            claimName: image-roundup-data
      containers:
        - name: image-roundup
          image: docker.io/fumbles/image-roundup:latest
          #image: docker.io/fumbles/image-roundup:1.0.9
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: IN_CLUSTER
              value: "true"
            - name: LISTEN_ADDR
              value: ":8080"
            - name: DATA_DIR
              value: "/data"
            # DOCKER_CONFIG must point to a directory containing config.json.
            # The registry-auth secret is mounted at that path below.
            # Remove this env var (and the volume) if no private registries are needed.
            - name: DOCKER_CONFIG
              value: "/var/run/registry-auth"
            # Hide images referenced through image-registry.openshift-image-registry.svc.
            # Leave this false if you want Image Roundup to inspect internal registry images.
            - name: EXCLUDE_INTERNAL_REGISTRY
              value: "true"
            # Comma-separated namespace denylist. Supports a trailing wildcard.
            # This overrides the built-in default, so keep the kube*/openshift*
            # entries when adding local operator-managed namespaces.
            - name: EXCLUDED_NAMESPACES
              value: "kube-system,kube-public,kube-node-lease,openshift*,istio*"
            # Default scan interval is 8 h (28800 s).
            # Override here if you need a different cadence:
            # - name: SCAN_INTERVAL_SECONDS
            #   value: "3600"
            # Comma-separated chart repository mappings used by the Helm tab.
            # Format: name=https://repo.example,name2=https://repo2.example
            - name: HELM_REPOSITORIES
              value: >-
                longhorn=https://charts.longhorn.io,
                kyverno=https://kyverno.github.io/kyverno/,
                policy-reporter=https://kyverno.github.io/policy-reporter,
                openshift-helm-charts=https://charts.openshift.io/
          volumeMounts:
            - name: data
              mountPath: /data
            - name: registry-auth
              mountPath: /var/run/registry-auth
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # /data must be writable
            capabilities:
              drop: ["ALL"]
            # runAsUser is intentionally absent — OpenShift injects the namespace UID.
---
apiVersion: v1
kind: Service
metadata:
  name: image-roundup
  namespace: image-roundup
  labels:
    app.kubernetes.io/name: image-roundup
spec:
  selector:
    app.kubernetes.io/name: image-roundup
  ports:
    - name: http
      port: 80
      targetPort: 8080
