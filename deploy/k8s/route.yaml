# OpenShift Route (created only when the Route API is available)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: image-roundup
  namespace: image-roundup
  labels:
    app.kubernetes.io/name: image-roundup
spec:
  # host: image-roundup.ns.apps.domain.com 
  to:
    kind: Service
    name: image-roundup
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
