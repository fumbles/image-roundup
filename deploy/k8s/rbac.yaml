# Apply order matters — run this file BEFORE deployment.yaml and pvc.yaml:
#
#   kubectl apply -f deploy/k8s/rbac.yaml
#   kubectl apply -f deploy/k8s/pvc.yaml
#   kubectl apply -f deploy/k8s/deployment.yaml
#   oc apply -f deploy/k8s/route.yaml   # OpenShift only
#
# Or apply the whole directory at once (kubectl orders by Kind automatically):
#   kubectl apply -f deploy/k8s/
#
# ── Namespace ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: image-roundup
  labels:
    app.kubernetes.io/name: image-roundup
---
# ── ServiceAccount ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-roundup
  namespace: image-roundup
  labels:
    app.kubernetes.io/name: image-roundup
---
# ── ClusterRole ────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: image-roundup
  labels:
    app.kubernetes.io/name: image-roundup
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  # OpenShift DeploymentConfigs
  - apiGroups: ["apps.openshift.io"]
    resources: ["deploymentconfigs"]
    verbs: ["get", "list", "watch"]
  # OpenShift integrated image registry route autodetection
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch"]
  # OpenShift integrated image registry pull authorization
  - apiGroups: ["image.openshift.io"]
    resources: ["imagestreams/layers"]
    verbs: ["get"]
---
# ── ClusterRoleBinding ─────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: image-roundup
  labels:
    app.kubernetes.io/name: image-roundup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: image-roundup
subjects:
  - kind: ServiceAccount
    name: image-roundup
    namespace: image-roundup
